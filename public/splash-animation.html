<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codinou</title>
<style>

  :root {
    --navy:#2d3a5c; --navy-deep:#1a2236; --navy-hi:#34425f;
    --coral:#e89e9a; --paper:#f4f1ea;
    --dur:4.6s; --ease:cubic-bezier(.40,.08,.25,1);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#0f1422; color:#e9edf6;
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif; }
  .wrap { min-height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:24px 16px; }

  /* ---- 9:16 recording stage ---- */
  .stage {
    position:relative; aspect-ratio:9/16; width:auto; height:min(86vh,760px);
    max-width:94vw; border-radius:22px; overflow:hidden; isolation:isolate;
    background:radial-gradient(120% 88% at 50% 24%,
       var(--navy-hi) 0%, var(--navy) 38%, #232d47 72%, var(--navy-deep) 100%);
    box-shadow:0 30px 80px -30px rgba(0,0,0,.7), inset 0 0 140px rgba(0,0,0,.35);
  }
  .stage.greenscreen { background:#00b140; }
  .stage.greenscreen .glow, .stage.greenscreen .particles, .stage.greenscreen .grain { display:none; }

  /* soft brand glow behind the mark */
  .glow {
    position:absolute; left:50%; top:40%; width:78%; aspect-ratio:1;
    transform:translate(-50%,-50%);
    background:radial-gradient(closest-side, rgba(232,158,154,.20), rgba(232,158,154,0) 70%);
    filter:blur(8px); z-index:0;
  }
  .stage.play .glow { animation:breathe 6s ease-in-out 0s infinite; }
  @keyframes breathe { 0%,100%{opacity:.55; transform:translate(-50%,-50%) scale(1);}
                        50%{opacity:1; transform:translate(-50%,-50%) scale(1.08);} }

  /* faint floating particles */
  .particles{position:absolute; inset:0; z-index:0; overflow:hidden;}
  .p{position:absolute; border-radius:50%; filter:blur(1px); opacity:.0;}
  .stage.play .p{animation:float 9s ease-in-out infinite;}
  .p1{width:7px;height:7px;background:var(--coral);left:18%;top:30%;animation-delay:.2s;}
  .p2{width:5px;height:5px;background:#fff;left:78%;top:24%;animation-delay:1.1s;}
  .p3{width:9px;height:9px;background:var(--coral);left:70%;top:70%;animation-delay:.6s;}
  .p4{width:4px;height:4px;background:#fff;left:26%;top:74%;animation-delay:1.6s;}
  .p5{width:6px;height:6px;background:#9fb0d6;left:50%;top:16%;animation-delay:.9s;}
  @keyframes float{0%{opacity:0;transform:translateY(10px);}
     25%{opacity:.5;}50%{opacity:.8;transform:translateY(-12px);}
     75%{opacity:.5;}100%{opacity:0;transform:translateY(10px);}}

  .grain{position:absolute; inset:0; z-index:3; pointer-events:none; opacity:.05;
    background-image:radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px);
    background-size:3px 3px;}

  /* logo svg */
  .mark { position:absolute; left:50%; top:39%; transform:translate(-50%,-50%);
    width:80%; z-index:2; }
  .mark svg { width:100%; height:auto; display:block; overflow:visible; }

  .ink { fill:none; stroke:#fff; stroke-width:132; stroke-linecap:round;
    stroke-linejoin:round; stroke-dasharray:1; stroke-dashoffset:1; }
  .clean { opacity:0; }

  .stage.play .ink { animation:draw var(--dur) var(--ease) forwards; }
  @keyframes draw { to { stroke-dashoffset:0; } }
  .stage.play .clean { animation:reveal .55s ease 4.5s forwards; }
  @keyframes reveal { to { opacity:1; } }

  /* the pencil rides the same path; its TIP (bottom-center of its box) sits on the line */
  .pencil { offset-path:path("M300 40 L150 145 L300 252 M322 250 L430 250 M452 40 L600 145 L452 252 M48 430 Q150 392 248 408 Q360 428 470 410 Q585 392 662 428"); offset-anchor:50% 100%; offset-rotate:0deg;
    offset-distance:0%; opacity:0; }
  .stage.play .pencil { opacity:1;
    animation:ride var(--dur) var(--ease) forwards,
              penfade .45s ease calc(var(--dur)) forwards; }
  @keyframes ride { to { offset-distance:100%; } }
  @keyframes penfade { to { opacity:0; } }

  /* caption */
  .caption { position:absolute; left:0; right:0; bottom:11%; z-index:2;
    text-align:center; opacity:0; padding:0 8%; }
  .caption .line { font-size:clamp(15px,3.4vw,22px); font-weight:600; letter-spacing:.01em;
    color:#eef1f8; }
  .caption .url { margin-top:8px; font-size:clamp(12px,2.7vw,15px); font-weight:700;
    letter-spacing:.22em; text-transform:uppercase; color:var(--coral); }
  .stage.play .caption { animation:rise .8s cubic-bezier(.2,.7,.2,1) 4.95s forwards; }
  @keyframes rise { from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;} }

  /* controls (kept OUTSIDE the stage so they aren't recorded) */
  .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  button { font:inherit; font-weight:600; font-size:14px; color:#e9edf6; cursor:pointer;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16);
    padding:9px 16px; border-radius:10px; transition:.15s; }
  button:hover { background:rgba(255,255,255,.12); }
  button:focus-visible { outline:2px solid var(--coral); outline-offset:2px; }
  .hint { font-size:12px; color:#8b93a7; max-width:320px; text-align:center; line-height:1.5; }

  @media (prefers-reduced-motion: reduce) {
    .ink { stroke-dashoffset:0 !important; animation:none !important; }
    .pencil { display:none !important; }
    .clean { opacity:1 !important; animation:none !important; }
    .caption { opacity:1 !important; transform:none !important; animation:none !important; }
    .glow,.p { animation:none !important; }
  }

  html, body { overflow: hidden; }
</style>
</head>
